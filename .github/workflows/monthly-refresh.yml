name: Monthly Refresh All Maps

on:
  schedule:
    # 매월 1일 오전 2시 (UTC)
    - cron: '0 2 1 * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monthly-maps
  cancel-in-progress: false

jobs:
  refresh-all-maps:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    env:
      PYTHONUNBUFFERED: "1"
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      
      - name: Install uv
        run: pip install uv
      
      - name: Install dependencies
        run: |
          cd utils
          uv sync
      
      - name: Run refreshAllMaps
        run: |
          cd utils
          uv run refreshAllMaps.py
      
      - name: Pull latest changes
        run: git pull origin ${{ github.ref_name }}
      
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add assets/maps.json utils/logs/
          
          if ! git diff --staged --quiet; then
            git commit -m "Monthly: Refresh all maps data"
            
            # 최대 3번 재시도
            for i in {1..3}; do
              git pull --rebase origin ${{ github.ref_name }} && \
              git push && break || sleep 2
            done
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
