<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DDNet Map Browser</title>
  <link rel="icon" href="./assets/tee_icon192.png"/>
  <link rel="apple-touch-icon" href="./assets/tee_icon192.png"/>
  <link rel="stylesheet" href="./css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-black">
  <nav class="topbar navbar navbar-expand-lg navbar-dark bg-black">
    <div class="container-fluid">
      <a class="navbar-brand" href="./">DDNetMapBrowser</a>
    </div>

    <div class="topbar__map-counter">
      <img class="invert-color map-counter__img" src="./assets/icon-map.svg">
      <span class="map-counter__text">-1 maps</span>
    </div>
  </nav>

  <div class="filter_bar">
    <div class="filter_bar__div map_type">
      <details class="map_type__details" open>
        <summary class="filter_summary">Map Type</summary>

        <div class="filter__type_parent">
        </div>
      </details>
    </div>

    <div class="filter_bar__div">
      <details class="difficulty__details" open>
        <summary class="filter_summary">Difficulty</summary>

        <div class="btn-group filter__difficulty_parent" role="group" aria-label="First group">
        </div>
      </details>
    </div>
    
    <div class="filter_bar__div tiles">
      <details class="tiles__details filter__tile_parent" open>
        <summary class="filter_summary">Tiles</summary>
      </details>
    </div>
  </div>

  <div class="map_cards">
    <div class="map_sort">
    </div>
    <div class="map_cards__parent">
      <div class="card bg-dark text-light">
        <div class="card__img_wrapper">
          <img src="https://ddnet.org/ranks/maps/Monochrome.png" class="card-img-top" alt="Monochrome" loading="lazy">

          <div class="card__inner_buttons">
            <a class="card__inner_button" href="https://ddnet.org/mappreview/?map=Monochrome" target="_blank">
              <img class="" src="./assets/icon-fullscreen.svg">
            </a>
            <a class="card__inner_button" href="https://ddnet.org/maps/Monochrome" target="_blank">
              <img class="" src="./assets/icon-arrowright.svg">
            </a>
          </div>
        </div>
        
        <div class="card-body">
          <div class="card__map-type" data-type="Novice">
            Novice
          </div>
          <h5 class="card-title">Monochrome</h5>
          <p class="card__mapper">By shini❡ami &amp; матвей</p>
          <div class="card__info">
            <span class="card__info-item">⭐13pts</span>
            <span class="card__info-item card__difficulty">★★★★☆</span>
          </div>
          <p class="card__footer">Released on 2026-03-22 14:00</p>
        </div>
      </div>
    </div>
  </div>
  
  <script src="./scripts/index.js" type="module"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
