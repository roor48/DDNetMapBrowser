<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse and filter DDNet maps by type, difficulty, and tiles. Explore Novice, Moderate, Brutal, Insane, DDmaX, Solo, Race, and more maps with detailed information.">
  <meta name="keywords" content="DDNet, DDraceNetwork, maps, browser, filter, Teeworlds, DDrace, Novice, Moderate, Brutal, Insane, DDmaX, Solo, Race, Dummy, Fun, Oldschool">
  <meta name="author" content="roor48">
 
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="DDNet Map Browser">
  <meta property="og:title" content="DDNet Map Browser">
  <meta property="og:description" content="Browse and filter DDNet maps...">
  <meta property="og:image" content="https://roor48.github.io/DDNetMapBrowser/assets/OG_image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:url" content="https://roor48.github.io/DDNetMapBrowser">
  <link rel="canonical" href="https://roor48.github.io/DDNetMapBrowser">
  
  <title>DDNet Map Browser</title>
  <link rel="stylesheet" href="./css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="sitemap" type="application/xml" href="./sitemap.xml">

  <!-- favicon -->
  <link rel="icon" type="image/x-icon" href="./favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/favicon/favicon-180x180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./assets/favicon/favicon-192x192.png">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#ffffff">
</head>
<body class="bg-black">
  <div class="topbar bg-black">
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="./">DDNetMapBrowser</a>
      </div>
    </nav>

    <div class="topbar__teename">
      <input id="teename-input" type="text" class="name-input" placeholder="Tee name">
      <button class="search-icon-wrapper">
        <img src="./assets/icon-arrow-circle-right.svg" class="search-icon invert-color">
      </button>
    </div>

    <div class="topbar__map-counter">
      <img class="invert-color map-counter__img" src="./assets/icon-map.svg">
      <span class="map-counter__text">0 maps</span>
    </div>
  </div>

  <div class="filter_bar">
    <div class="filter_bar__div search_map">
      <div class="map-search-wrapper search-wrapper">
        <input type="text" class="filter__map-search form-control" placeholder="Map search">
      </div>
      <div class="mapper-search-wrapper search-wrapper">
        <input type="text" class="filter__mapper-search form-control" placeholder="Mapper search">
      </div>
    </div>

    <div class="filter_bar__div map_type">
      <details class="map_type__details" open>
        <summary class="filter_summary">Map Type</summary>

        <div class="filter__type_parent">
        </div>
      </details>
    </div>

    <div class="filter_bar__div">
      <details class="difficulty__details" open>
        <summary class="filter_summary">Difficulty</summary>

        <div class="difficulty__range-container">
          <div class="difficulty__labels">
            <span class="difficulty__label">Min: <span class="difficulty-min-value">0</span></span>
            <span class="difficulty__label">Max: <span class="difficulty-max-value">5</span></span>
          </div>
          <div class="difficulty__sliders">
            <div class="difficulty__range-fill"></div>
            <input type="range" class="difficulty__slider" min="0" max="5" value="0" step="1">
            <input type="range" class="difficulty__slider" min="0" max="5" value="5" step="1">
          </div>
        </div>
      </details>
    </div>
    
    <div class="filter_bar__div tiles">
      <details class="tiles__details filter__tile_parent" open>
        <summary class="filter_summary">Tiles</summary>
      </details>
    </div>
  </div>

  <div class="map_cards">
    <div class="map_sort">
    </div>
    
    <div class="map_cards__parent">
    </div>

    <div class="loading-dot">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>

  <div class="up-button">
    <img class="invert-color" src="assets/icon-up-circle.svg" onclick="window.scrollTo({ top: 0, behavior: 'smooth'});">
  </div>

  <script src="./scripts/index.js" type="module"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
