<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DDNet Map Browser</title>
  <link rel="icon" href="./assets/tee_icon192.png"/>
  <link rel="apple-touch-icon" href="./assets/tee_icon192.png"/>
  <link rel="stylesheet" href="./css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-black font-sans">
  <div class="filter_bar">
    <div class="filter_bar__div map_type">
      <details class="map_type__details" open>
        <summary class="filter_summary">Map Type</summary>

        <div class="filter__type_parent">
        </div>
      </details>
    </div>
    
    <div class="filter_bar__div">
      <details class="difficulty__details" open>
        <summary class="filter_summary">Difficulty</summary>

        <div class="btn-group filter__difficulty_parent" role="group" aria-label="First group">
        </div>
      </details>
    </div>
    
    <div class="filter_bar__div tiles">
      <details class="tiles__details filter__tile_parent" open>
        <summary class="filter_summary">Tiles</summary>
      </details>
    </div>
  </div>

  <div class="map_cards">
    <div class="map_cards__parent">
      <h2 style="color: #f0f0f0;">Loading...</h2>
    </div>
  </div>
  
  <script src="./scripts/index.js" type="module"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
