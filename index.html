<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DDNet Map Browser</title>
  <link rel="stylesheet" href="./css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-black font-sans">
  <div class="filter_bar">
    <div class="filter_bar__div map_type">
      <details class="map_type__details" open>
        <summary class="filter_summary">Map Type</summary>

        <div class="form-check">
          <input id="novice" class="map_type__checkbox form-check-input" type="checkbox" value="">
          <label class="form-check-label" for="novice">Novice</label>
        </div>

        <div class="form-check">
          <input id="moderate" class="map_type__checkbox form-check-input" type="checkbox" value="">
          <label class="form-check-label" for="moderate">Moderate</label>
        </div>
        
        <div class="form-check">
          <input id="brutal" class="map_type__checkbox form-check-input" type="checkbox" value="">
          <label class="form-check-label" for="brutal">Brutal</label>
        </div>
        
        <div class="form-check">
          <input id="insane" class="map_type__checkbox form-check-input" type="checkbox" value="">
          <label class="form-check-label" for="insane">Insane</label>
        </div>
        
        <div class="form-check">
          <input id="dummy" class="map_type__checkbox form-check-input" type="checkbox" value="">
          <label class="form-check-label" for="dummy">Dummy</label>
        </div>
        
        <div class="form-check">
          <input id="oldschool" class="map_type__checkbox form-check-input" type="checkbox" value="">
          <label class="form-check-label" for="oldschool">Oldschool</label>
        </div>
        
        <div class="form-check">
          <input id="solo" class="map_type__checkbox form-check-input" type="checkbox" value="">
          <label class="form-check-label" for="solo">Solo</label>
        </div>
        
        <div class="form-check">
          <input id="race" class="map_type__checkbox form-check-input" type="checkbox" value="">
          <label class="form-check-label" for="race">Race</label>
        </div>
        
        <div class="form-check">
          <input id="fun" class="map_type__checkbox form-check-input" type="checkbox" value="">
          <label class="form-check-label" for="fun">Fun</label>
        </div>
        
        <div class="form-check">
          <input id="event" class="map_type__checkbox form-check-input" type="checkbox" value="">
          <label class="form-check-label" for="event">Event</label>
        </div>
        
        <div class="map_type__ddmax">
          <p class="map_type__ddmax__p">
            DDmaX
          </p>
          <div class="form-check">
            <input id="ddmax_easy" class="map_type__checkbox form-check-input" type="checkbox" value="">
            <label class="form-check-label" for="ddmax_easy">DDmaX.Easy</label>
          </div>

          <div class="form-check">
            <input id="ddmax_next" class="map_type__checkbox form-check-input" type="checkbox" value="">
            <label class="form-check-label" for="ddmax_next">DDmaX.Next</label>
          </div>

          <div class="form-check">
            <input id="ddmax_pro" class="map_type__checkbox form-check-input" type="checkbox" value="">
            <label class="form-check-label" for="ddmax_pro">DDmaX.Pro</label>
          </div>

          <div class="form-check">
            <input id="ddmax_nut" class="map_type__checkbox form-check-input" type="checkbox" value="">
            <label class="form-check-label" for="ddmax_nut">DDmaX.Nut</label>
          </div>
        </div>
      </details>
    </div>

    <div class="filter_bar__div difficulty">
      <details class="difficulty__details" open>
        <summary class="filter_summary">Difficulty</summary>

        <div class="btn-group" role="group" aria-label="First group">

          <input type="checkbox" class="btn-check" id="difficulty__0" autocomplete="off">
          <label class="btn btn-secondary" for="difficulty__0">0</label>

          <input type="checkbox" class="btn-check" id="difficulty__1" autocomplete="off">
          <label class="btn btn-secondary" for="difficulty__1">1</label>

          <input type="checkbox" class="btn-check" id="difficulty__2" autocomplete="off">
          <label class="btn btn-secondary" for="difficulty__2">2</label>
          
          <input type="checkbox" class="btn-check" id="difficulty__3" autocomplete="off">
          <label class="btn btn-secondary" for="difficulty__3">3</label>
          
          <input type="checkbox" class="btn-check" id="difficulty__4" autocomplete="off">
          <label class="btn btn-secondary" for="difficulty__4">4</label>
          
          <input type="checkbox" class="btn-check" id="difficulty__5" autocomplete="off">
          <label class="btn btn-secondary" for="difficulty__5">5</label>
        </div>
      </details>
    </div>
    
    <div class="filter_bar__div tiles">
      <details class="tiles__details tiles__tile_parent" open>
        <summary class="filter_summary">Tiles</summary>
      </details>
    </div>
  </div>

  <div class="map_cards">
    <h2 style="color: #f0f0f0;">Loading...</h2>
  </div>
  
  <script src="./scripts/index.js" type="module"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
