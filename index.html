<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse and filter DDNet maps by type, difficulty, and tiles. Explore Novice, Moderate, Brutal, Insane, DDmaX, Solo, Race, and more maps with detailed information.">
  <meta name="keywords" content="DDNet, DDraceNetwork, maps, browser, filter, Teeworlds, DDrace, Novice, Moderate, Brutal, Insane, DDmaX, Solo, Race, Dummy, Fun, Oldschool">
  <meta name="author" content="roor48">
 
  <meta property="og:title" content="DDNet Map Browser">
  <meta property="og:description" content="Browse and filter DDNet maps...">
  <meta property="og:image" content="https://roor48.github.io/DDNetMapBrowser/assets/tee_icon192.png">
  <meta property="og:url" content="https://roor48.github.io/DDNetMapBrowser/">
  
  <title>DDNet Map Browser</title>
  <link rel="icon" href="./assets/tee_icon192.png">
  <link rel="apple-touch-icon" href="./assets/tee_icon192.png">
  <link rel="stylesheet" href="./css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="sitemap" type="application/xml" href="./sitemap.xml">
</head>
<body class="bg-black">
  <nav class="topbar navbar navbar-expand-lg navbar-dark bg-black">
    <div class="container-fluid">
      <a class="navbar-brand" href="./">DDNetMapBrowser</a>
    </div>

    <div class="topbar__map-counter">
      <img class="invert-color map-counter__img" src="./assets/icon-map.svg">
      <span class="map-counter__text">0 maps</span>
    </div>
  </nav>

  <div class="filter_bar">
    <div class="filter_bar__div map_type">
      <details class="map_type__details" open>
        <summary class="filter_summary">Map Type</summary>

        <div class="filter__type_parent">
        </div>
      </details>
    </div>

    <div class="filter_bar__div">
      <details class="difficulty__details" open>
        <summary class="filter_summary">Difficulty</summary>

        <div class="difficulty__range-container">
          <div class="difficulty__labels">
            <span class="difficulty__label">Min: <span class="difficulty-min-value">0</span></span>
            <span class="difficulty__label">Max: <span class="difficulty-max-value">5</span></span>
          </div>
          <div class="difficulty__sliders">
            <div class="difficulty__range-fill"></div>
            <input type="range" class="difficulty__slider" min="0" max="5" value="0" step="1">
            <input type="range" class="difficulty__slider" min="0" max="5" value="5" step="1">
          </div>
        </div>
      </details>
    </div>
    
    <div class="filter_bar__div tiles">
      <details class="tiles__details filter__tile_parent" open>
        <summary class="filter_summary">Tiles</summary>
      </details>
    </div>
  </div>

  <div class="map_cards">
    <div class="map_sort">
    </div>
    
    <div class="map_cards__parent">
    </div>

    <div class="loading-dot">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>
  <script src="./scripts/index.js" type="module"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
